{% extends "base.html" %}
{% load static %}

{% block title %}
Create Account
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>Create Account</h2>

        <p>Create your SecureAuth account</p>

        <form id="signupForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="text"
                id="first_name"
                placeholder="First Name"
                required
            >

            <input
                type="text"
                id="last_name"
                placeholder="Last Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="text"
                id="phone_number"
                placeholder="Phone Number"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Create Account

            </button>

        </form>

        <p id="message"></p>

        <hr>

        <p>

            Already have an account?

            <a href="{% url 'login' %}">

                Login

            </a>

        </p>

    </div>

</div>

<script src="{% static 'js/signup.js' %}"></script>

{% endblock %}
