{% extends "base.html" %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>Login</h2>

        <p>Sign in to your SecureAuth account</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

        <hr>

        <p>
            Don't have an account?

            <a href="/signup/">
                Create Account
            </a>

        </p>

    </div>

</div>

<script src="{% static 'js/login.js' %}"></script>

{% endblock %}
